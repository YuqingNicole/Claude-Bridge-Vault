<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Bridge Vault - 管理后台 💎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">Claude Bridge Vault 💎</h1>
            <p class="text-slate-400 mt-2">Nicole 的 API 炼油厂 - 双轨隔离分发中心</p>
        </header>

        <section class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
            <h2 class="text-xl font-semibold mb-4">生成分发子密钥 (Sub-key)</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300">选择轨道</label>
                    <select id="track" class="w-full mt-1 p-2 bg-slate-900 border border-slate-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-cyan-500">
                        <option value="botearn">Track A: BotEarn (外部协作)</option>
                        <option value="private">Track B: Private (团队/个人)</option>
                    </select>
                </div>
                <button onclick="generateKey()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-2 rounded transition shadow-lg shadow-cyan-900/20">
                    立即炼制 Key
                </button>
            </div>

            <div id="result" class="mt-8 hidden">
                <div class="p-4 bg-slate-900 rounded border border-cyan-900/50">
                    <p class="text-xs uppercase tracking-wider text-slate-500 font-bold mb-2">生成成功！</p>
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs text-cyan-400">Sub-Key</label>
                            <code id="resKey" class="block bg-black p-2 mt-1 rounded text-sm break-all"></code>
                        </div>
                        <div>
                            <label class="text-xs text-cyan-400">Base URL</label>
                            <code id="resUrl" class="block bg-black p-2 mt-1 rounded text-sm break-all"></code>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        async function generateKey() {
            const track = document.getElementById('track').value;
            const res = await fetch('/admin/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ track })
            });
            const data = await res.json();
            
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('resKey').innerText = data.sub_key;
            document.getElementById('resUrl').innerText = data.base_url;
        }
    </script>
</body>
</html>
